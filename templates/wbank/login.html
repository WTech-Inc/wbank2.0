<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBank 登入 — 泓財銀行</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter','Segoe UI',sans-serif;
            background:linear-gradient(135deg,#0a0a1a 0%,#141433 50%,#0a0a1a 100%);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            color:#fff;overflow:hidden
        }
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        .container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
        .brand{text-align:center;margin-bottom:32px}
        .brand .logo{font-size:28px;font-weight:700;background:linear-gradient(135deg,#4fc3f7,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .brand .sub{font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px;letter-spacing:2px}
        .brand .divider{width:24px;height:2px;background:linear-gradient(135deg,#4fc3f7,#00bcd4);margin:10px auto;border-radius:2px;opacity:0.5}
        .login-card{
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:12px;padding:36px 28px 28px;
            backdrop-filter:blur(12px);
        }
        .login-card h2{font-size:18px;font-weight:600;margin-bottom:4px}
        .login-card .hint{font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:24px}
        .input-group{margin-bottom:16px}
        .input-group label{display:block;font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
        .input-group input{
            width:100%;padding:12px 14px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:8px;color:#fff;
            font-size:14px;font-family:inherit;
            transition:border-color .2s,box-shadow .2s;
            outline:none
        }
        .input-group input:focus{border-color:#4fc3f7;box-shadow:0 0 0 3px rgba(79,195,247,0.1)}
        .input-group input::placeholder{color:rgba(255,255,255,0.15)}
        .btn-login{
            width:100%;padding:12px;
            background:linear-gradient(135deg,#4fc3f7,#00bcd4);
            border:none;border-radius:8px;
            color:#080818;font-weight:600;font-size:14px;
            cursor:pointer;transition:transform .2s,box-shadow .2s;
            font-family:inherit;margin-top:4px
        }
        .btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(79,195,247,0.2)}
        .btn-login:active{transform:translateY(0)}
        .footer-links{display:flex;justify-content:center;gap:20px;margin-top:20px}
        .footer-links a{font-size:11px;color:rgba(255,255,255,0.2);text-decoration:none;transition:color .2s}
        .footer-links a:hover{color:rgba(255,255,255,0.4)}
        .status-msg{font-size:12px;color:#ef4444;text-align:center;margin-bottom:12px;display:none}
        .chain-badge{
            text-align:center;margin-top:24px;
            font-size:10px;color:rgba(255,255,255,0.12);letter-spacing:0.5px
        }
        .security-info{
            display:flex;justify-content:center;gap:16px;margin-top:16px;
            font-size:10px;color:rgba(255,255,255,0.12)
        }
        @media(max-width:480px){
            .login-card{padding:28px 20px}
            .brand .logo{font-size:24px}
        }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="container">
    <div class="brand">
        <div class="logo">WBank</div>
        <div class="sub">泓財銀行 · 金融科技</div>
        <div class="divider"></div>
    </div>
    <div class="login-card">
        <h2>登入</h2>
        <p class="hint">輸入帳戶資料以存取 WBank</p>
        <div id="status" class="status-msg"></div>
        <form id="login-form" action="/wbank/auth/v1/session" method="POST">
            <div class="input-group">
                <label>用戶名稱</label>
                <input type="text" name="user" placeholder="Username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <label>密碼</label>
                <input type="password" name="pw" placeholder="Password" autocomplete="current-password" required>
            </div>
            <input type="hidden" name="url" value="{{ url }}">
            <button type="submit" class="btn-login">登入</button>
        <p style="text-align:center;margin-top:14px;font-size:12px;color:rgba(255,255,255,0.25);">尚未開戶？<a href="/wbank/register" style="color:#4fc3f7;text-decoration:none;">立即開戶</a></p>
        </form>
        <div class="security-info">
            <span>🔒 SSL 加密</span>
            <span>⛓️ WCoins Chain 425</span>
        </div>
    </div>
    <div class="chain-badge">WCoins Mainnet · Chain ID 425</div>
    <div class="footer-links">
        <a href="/">首頁</a>
        <a href="/wbank/register">開戶</a>
        <a href="/wcoins/explorer">Explorer</a>
    </div>
</div>

<script>
// Particle background
(function(){
    var c=document.getElementById('particles'),cx=c.getContext('2d');
    function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
    resize();window.addEventListener('resize',resize);
    var p=[];
    for(var i=0;i<40;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+.5,a:Math.random()*.3+.1,t:Math.random()*6});
    function anim(){
        cx.clearRect(0,0,c.width,c.height);
        for(var i=0;i<p.length;i++){
            for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){cx.beginPath();cx.moveTo(p[i].x,p[i].y);cx.lineTo(p[j].x,p[j].y);cx.strokeStyle='rgba(79,195,247,'+(.05*(1-d/150))+')';cx.lineWidth=.5;cx.stroke()}}
        }
        for(var i=0;i<p.length;i++){
            var q=p[i];q.x+=q.vx+Math.sin(q.t)*.08;q.y+=q.vy+Math.cos(q.t)*.08;
            if(q.x<-20)q.x=c.width+20;if(q.x>c.width+20)q.x=-20;if(q.y<-20)q.y=c.height+20;if(q.y>c.height+20)q.y=-20;
            cx.beginPath();cx.arc(q.x,q.y,q.r,0,Math.PI*2);cx.fillStyle='rgba(79,195,247,'+q.a+')';cx.fill()
        }
        requestAnimationFrame(anim)
    }
    anim()
})();

// Form submit - show status
document.getElementById('login-form').addEventListener('submit',function(e){
    var btn=this.querySelector('.btn-login');
    btn.textContent='登入中...';btn.disabled=true;
});
</script>
</body>
</html>

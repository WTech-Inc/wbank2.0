<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WPay 泓之付</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0a1a,#141433);min-height:100vh;color:#fff;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:24px;max-width:400px}
.logo{font-size:36px;margin-bottom:8px}
h1{font-size:28px;font-weight:700;margin-bottom:4px}
h1 span{background:linear-gradient(135deg,#4fc3f7,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:32px}
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:20px;text-decoration:none;color:#fff;transition:all.2s}
.card:hover{transform:translateY(-2px);border-color:rgba(79,195,247,0.2);background:rgba(79,195,247,0.04)}
.card .icon{font-size:28px;margin-bottom:6px}
.card h3{font-size:16px;font-weight:600}
.card p{font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px}
.footer{font-size:11px;color:rgba(255,255,255,0.12);margin-top:32px}
</style></head>
<body>
<div class="container">
<div class="logo">💳</div>
<h1>WPay <span>泓之付</span></h1>
<p class="sub">WCoins 支付系統</p>
<div class="cards">
<a href="/wpay/merchant/login" class="card"><div class="icon">🏪</div><h3>商戶登入</h3><p>管理收款碼及交易記錄</p></a>
<a href="/wpay/pay/0" class="card"><div class="icon">📱</div><h3>用戶付款</h3><p>掃碼支付 WCoins</p></a>
</div>
<div class="footer">WCoins Blockchain · WPay v1.0</div>
</div>
</body>
</html>
